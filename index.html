<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema LICOEXPRESS - Control Total</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --azul-oscuro: #002060; --negro-borde: #000; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f0f0f0; display: flex; justify-content: center; }
        .view { display: none; }
        .view.active { display: flex; gap: 20px; }
        .main-container { max-width: 1200px; background: #fff; padding: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .factura-wrapper { flex: 3; position: relative; background: white; padding: 10px; }
        
        #bloqueo-seguridad {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999;
            color: white; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .tabla-factura { border-collapse: collapse; width: 100%; margin-bottom: 2px; }
        .tabla-factura input { width: 100%; border: none; padding: 4px; box-sizing: border-box; background: transparent; display: block; font-family: Arial; }
        .label-cell { background-color: var(--azul-oscuro); color: #fff; font-weight: bold; width: 120px; text-align: center; border: 1px solid var(--negro-borde); font-size: 12px; }
        .value-cell { border: 1px solid var(--negro-borde); text-align: center; }

        .productos-table th { background-color: var(--azul-oscuro); color: #fff; font-size: 11px; border: 1px solid var(--negro-borde); padding: 8px; }
        .productos-table td { border: 1px solid var(--negro-borde); height: 28px; position: relative; font-size: 12px; }

        .seccion-totales { width: 100%; border-collapse: collapse; margin-top: -1px; }
        .seccion-totales td { border: 1px solid var(--negro-borde); height: 25px; font-size: 12px; }
        .label-total { background-color: var(--azul-oscuro); color: white; font-weight: bold; width: 150px; padding-left: 8px; text-transform: uppercase; }
        .value-total { text-align: right; padding-right: 10px; font-weight: bold; width: 150px; }
        .input-nota { width: 100%; border: none; text-align: right; font-weight: bold; color: #cc0000; padding-right: 10px; box-sizing: border-box; }

        .sidebar { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 20px; min-width: 200px; }
        .logo-placeholder { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #cc0000; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; text-align: center; color: #000; margin-bottom: 10px; }

        .btn { width: 100%; border: none; color: white; font-weight: bold; padding: 12px; cursor: pointer; border-radius: 6px; transition: all 0.3s; font-size: 13px; }
        .btn-guardar { background: linear-gradient(135deg, #000a30, #004e92); }
        .btn-nuevo { background: linear-gradient(135deg, #00d2ff, #3a7bd5); }
        .btn-db { background: #28a745; }
        .btn-respaldo { background: #d35400; }

        .sugerencias { position: absolute; background: white; border: 1px solid #002060; z-index: 9999; width: 100%; max-height: 200px; overflow-y: auto; display: none; top: 100%; left: 0; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .sugerencia-item { padding: 10px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #eee; color: #333; }
        .sugerencia-item:hover { background-color: #f0f0f0; color: #002060; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow-y: auto; padding: 40px 0; }
        .modal-content { background: white; margin: auto; padding: 20px; width: 850px; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 10px; font-size: 30px; cursor: pointer; color: red; }

        @media print {
            .sidebar, .btn, .sugerencias, .close-modal, .view:not(.active) { display: none !important; }
            body { background: white; padding: 0; }
            .main-container { box-shadow: none; border: none; width: 100%; }
        }
    </style>
</head>
<body onload="init()">

    <div id="bloqueo-seguridad">
        <h1>SISTEMA BLOQUEADO</h1>
        <p>Realice el respaldo semanal para continuar.</p>
        <button class="btn btn-respaldo" onclick="exportarTodoExcel()" style="width: 300px;">DESCARGAR RESPALDO</button>
    </div>

    <div class="main-container">
        <div id="vista-factura" class="view active">
            <div class="factura-wrapper" id="area-captura">
                <table class="tabla-factura">
                    <tr>
                        <td rowspan="3" colspan="2" style="text-align: center; border: 1px solid #000;"><h2 style="margin:0; color: #002060;">LICOEXPRESS</h2><p style="font-size: 10px; margin:0;">REMISIÓN DE VENTA</p></td>
                        <td class="label-cell">FECHA</td>
                        <td class="value-cell"><input type="text" id="fecha-input"></td>
                    </tr>
                    <tr>
                        <td class="label-cell">FACTURA N°</td>
                        <td class="value-cell"><input type="text" id="n-factura" value="CLAH-001"></td>
                    </tr>
                    <tr>
                        <td class="label-cell">CLIENTE</td>
                        <td class="value-cell"><input type="text" id="cliente-input" placeholder="Nombre del cliente"></td>
                    </tr>
                </table>

                <table class="tabla-factura productos-table">
                    <thead>
                        <tr>
                            <th>CÓDIGO</th>
                            <th>DESCRIPCIÓN</th>
                            <th>CAJAS</th>
                            <th>UDS</th>
                            <th>PRECIO VENTA</th>
                            <th>UNITARIO</th>
                            <th>TOTAL</th>
                        </tr>
                    </thead>
                    <tbody id="body-factura"></tbody>
                </table>

                <table class="seccion-totales">
                    <tr>
                        <td rowspan="3" style="width: 50%;"></td>
                        <td class="label-total">SUBTOTAL</td>
                        <td class="value-total" id="subtotal-factura">$ 0</td>
                    </tr>
                    <tr>
                        <td class="label-total" style="background-color: #cc0000;">NOTA CRÉDITO</td>
                        <td class="value-total"><input type="text" id="nota-credito" class="input-nota" value="-$ 0" oninput="recalcularConNota()"></td>
                    </tr>
                    <tr>
                        <td class="label-total">VALOR FACTURA</td>
                        <td class="value-total" id="total-factura" style="font-size: 18px; color: #002060;">$ 0</td>
                    </tr>
                </table>
            </div>

            <div class="sidebar">
                <div class="logo-placeholder">LICO<br>EXPRESS</div>
                <button class="btn btn-guardar" onclick="guardarFacturaVisual()">💾 GUARDAR</button>
                <button class="btn btn-nuevo" onclick="nuevaFactura()">📄 NUEVA</button>
                <button class="btn btn-historial" style="background:#002060" onclick="cambiarVista('vista-historial')">📜 HISTORIAL</button>
                <button class="btn btn-db" onclick="cambiarVista('vista-db')">📦 INVENTARIO</button>
                <button class="btn btn-respaldo" onclick="exportarTodoExcel()">📥 RESPALDO</button>
            </div>
        </div>

        <div id="vista-historial" class="view">
            <div style="width:100%">
                <button class="btn btn-nuevo" onclick="cambiarVista('vista-factura')" style="width:200px">⬅ VOLVER</button>
                <table class="tabla-factura" style="margin-top:20px">
                    <thead><tr class="label-cell"><th>ID</th><th>FECHA</th><th>CLIENTE</th><th>TOTAL</th><th>VER</th></tr></thead>
                    <tbody id="lista-historial"></tbody>
                </table>
            </div>
        </div>

        <div id="vista-db" class="view">
            <div style="width:100%">
                <button class="btn btn-nuevo" onclick="cambiarVista('vista-factura')" style="width:150px">⬅ VOLVER</button>
                <input type="file" id="import-file" style="display:none">
                <button class="btn btn-db" onclick="document.getElementById('import-file').click()" style="width:150px; background: #002060;">📂 SUBIR EXCEL</button>
                <button class="btn btn-db" onclick="aniadirItemManual()" style="width:150px">➕ AÑADIR ITEM</button>
                
                <table class="tabla-factura" style="margin-top:20px">
                    <thead><tr class="label-cell"><th>CÓDIGO</th><th>NOMBRE</th><th>UNIDAD/CAJA</th></tr></thead>
                    <tbody id="lista-db"></tbody>
                </table>
            </div>
        </div>
    </div>

        <div style="text-align: center; margin-top: 20px;"><button class="btn btn-guardar" onclick="window.print()" style="width: 200px;">IMPRIMIR</button></div>

        let dbProductos = JSON.parse(localStorage.getItem('lico_db')) || bdInicial;
        let historialVisual = JSON.parse(localStorage.getItem('lico_historial_visual')) || [];

        function init() {
            renderizarFilas();
            renderizarDB();
            document.getElementById('fecha-input').value = new Date().toLocaleDateString();
            document.getElementById('import-file').addEventListener('change', manejarImportacion);
            verificarRespaldoSemanal();
        }

        function verificarRespaldoSemanal() {
            const ultima = localStorage.getItem('lico_ultima_exportacion');
            if (ultima) {
                const dias = (new Date().getTime() - parseInt(ultima)) / (1000 * 60 * 60 * 24);
                if (dias >= 7) document.getElementById('bloqueo-seguridad').style.display = 'flex';
            } else {
                localStorage.setItem('lico_ultima_exportacion', new Date().getTime());
            }
        }

        function aniadirItemManual() {
            const cod = prompt("Ingrese el Código:");
            if (!cod) return;
            const nom = prompt("Ingrese la Descripción:");
            if (!nom) return;
            const uni = prompt("Unidades por Caja:", "1");
            if (!uni) return;

            dbProductos.push({
                codigo: String(cod),
                nombre: nom.toUpperCase(),
                unidad: parseInt(uni) || 1
            });

            localStorage.setItem('lico_db', JSON.stringify(dbProductos));
            renderizarDB();
            alert("Ítem añadido exitosamente.");
        }

        function renderizarFilas() {
            const body = document.getElementById('body-factura');
            body.innerHTML = "";
            for(let i=0; i<15; i++) {
                body.innerHTML += `
                <tr class="fila-p">
                    <td><input type="text" class="cod-in" onkeyup="buscarPorCodigo(this)"></td>
                    <td style="width:250px"><input type="text" class="nom-in" oninput="buscarSugerencias(this)"><div class="sugerencias"></div></td>
                    <td><input type="number" class="caj" oninput="calcular(this)"></td>
                    <td><input type="number" class="uds" readonly></td>
                    <td><input type="number" class="pre" oninput="calcular(this)"></td>
                    <td align="right">$ <span class="pun">0</span></td>
                    <td align="right">$ <span class="tot">0</span></td>
                </tr>`;
            }
        }

        function buscarPorCodigo(input) {
            const cod = input.value.trim();
            if(cod === "") return;
            const p = dbProductos.find(x => String(x.codigo).trim() === cod);
            if(p) {
                const f = input.closest('tr');
                f.querySelector('.nom-in').value = p.nombre;
                f.dataset.uCaja = p.unidad;
                f.querySelector('.caj').value = 1;
                calcular(f.querySelector('.caj'));
            }
        }

        function buscarSugerencias(input) {
            const container = input.nextElementSibling;
            const texto = input.value.toLowerCase();
            container.innerHTML = "";
            if(texto.length < 2) { container.style.display = "none"; return; }
            dbProductos.filter(p => p.nombre.toLowerCase().includes(texto)).slice(0,8).forEach(p => {
                const div = document.createElement('div');
                div.className = "sugerencia-item";
                div.innerHTML = p.nombre;
                div.onclick = () => {
                    const f = input.closest('tr');
                    f.querySelector('.cod-in').value = p.codigo;
                    f.querySelector('.nom-in').value = p.nombre;
                    f.dataset.uCaja = p.unidad;
                    f.querySelector('.caj').value = 1;
                    container.style.display = "none";
                    calcular(f.querySelector('.caj'));
                };
                container.appendChild(div);
            });
            container.style.display = "block";
        }

        function calcular(el) {
            const f = el.closest('tr');
            const caj = parseFloat(f.querySelector('.caj').value) || 0;
            const pre = parseFloat(f.querySelector('.pre').value) || 0;
            const uCaja = parseFloat(f.dataset.uCaja) || 1;
            const tUds = caj * uCaja;
            const tFila = caj * pre;
            f.querySelector('.uds').value = tUds;
            f.querySelector('.tot').innerText = tFila.toLocaleString('de-DE');
            f.querySelector('.pun').innerText = tUds > 0 ? (tFila/tUds).toLocaleString('de-DE', {maximumFractionDigits:0}) : 0;
            recalcularTotalesBase();
        }

        function recalcularTotalesBase() {
            let suma = 0;
            document.querySelectorAll('.tot').forEach(s => suma += parseFloat(s.innerText.replace(/\./g,'')) || 0);
            document.getElementById('subtotal-factura').innerText = '$ ' + suma.toLocaleString('de-DE');
            recalcularConNota();
        }

        function recalcularConNota() {
            const subText = document.getElementById('subtotal-factura').innerText.replace('$ ','').replace(/\./g,'');
            const sub = parseFloat(subText) || 0;
            const nota = parseFloat(document.getElementById('nota-credito').value.replace(/[^\d]/g, '')) || 0;
            document.getElementById('total-factura').innerText = '$ ' + (sub - nota).toLocaleString('de-DE');
        }

        function guardarFacturaVisual() {
            const cli = document.getElementById('cliente-input').value;
            if(!cli) return alert("Ingrese el cliente");
            const area = document.getElementById('area-captura');
            const clon = area.cloneNode(true);
            clon.querySelectorAll('.fila-p').forEach(f => { if(!f.querySelector('.cod-in').value) f.remove(); });
            clon.querySelectorAll('input').forEach(ins => {
                const span = document.createElement('span'); span.innerText = ins.value; ins.parentNode.replaceChild(span, ins);
            });
            historialVisual.push({
                id: document.getElementById('n-factura').value,
                fecha: document.getElementById('fecha-input').value,
                cliente: cli,
                total: document.getElementById('total-factura').innerText,
                html: clon.innerHTML
            });
            localStorage.setItem('lico_historial_visual', JSON.stringify(historialVisual));
            alert("Factura guardada");
        }

        function exportarTodoExcel() {
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dbProductos), "Productos");
            XLSX.writeFile(wb, "Respaldo_LicoExpress.xlsx");
            localStorage.setItem('lico_ultima_exportacion', new Date().getTime());
            document.getElementById('bloqueo-seguridad').style.display = 'none';
        }

        function cambiarVista(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'vista-historial') renderizarHistorial();
        }

        function renderizarHistorial() {
            document.getElementById('lista-historial').innerHTML = historialVisual.map((f, i) => `<tr><td>${f.id}</td><td>${f.fecha}</td><td>${f.cliente}</td><td>${f.total}</td><td align="center"><button onclick="verCaptura(${i})">👁️</button></td></tr>`).join('');
        }

        function verCaptura(i) {
            document.getElementById('contenido-modal').innerHTML = historialVisual[i].html;
            document.getElementById('modalFactura').style.display = "block";
        }

        function cerrarModal() { document.getElementById('modalFactura').style.display = "none"; }
        function renderizarDB() { document.getElementById('lista-db').innerHTML = dbProductos.map(p => `<tr><td>${p.codigo}</td><td>${p.nombre}</td><td>${p.unidad}</td></tr>`).join(''); }

        function manejarImportacion(e) {
            const r = new FileReader();
            r.onload = (x) => {
                const j = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(x.target.result), {type:'array'}).Sheets[XLSX.read(new Uint8Array(x.target.result), {type:'array'}).SheetNames[0]]);
                dbProductos = j.map(i => ({codigo:String(i.CODIGO||i.codigo), nombre:i.DESCRIPCION||i.descripcion, unidad:i.UNIDAD||1}));
                localStorage.setItem('lico_db', JSON.stringify(dbProductos)); renderizarDB();
            };
            r.readAsArrayBuffer(e.target.files[0]);
        }

        function nuevaFactura() {
            if(confirm("¿Nueva factura?")) location.reload();
        }
    </script>
